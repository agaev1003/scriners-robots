<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Загрузка дивидендов — MOEX ISS</title>
<style>
body{font-family:monospace;background:#1a1a2e;color:#eee;padding:20px}
button{background:#e94560;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:14px;cursor:pointer;margin:8px 4px}
button:disabled{opacity:0.4}
#log{background:#0f0f23;border:1px solid #333;border-radius:6px;padding:12px;margin-top:12px;max-height:500px;overflow-y:auto;font-size:12px;line-height:1.6;white-space:pre-wrap}
.ok{color:#00b894}.err{color:#e17055}.warn{color:#fdcb6e}
a{color:#74b9ff}
</style>
</head>
<body>
<h2>Загрузка дивидендов с MOEX ISS API</h2>
<p>Скрипт загружает список всех акций TQBR (листинг 1-3), затем для каждого тикера
запрашивает дивиденды через <code>/iss/securities/{TICKER}/dividends.json</code>
и сохраняет результат в <b>dividends.json</b>.</p>
<p>Положите файл рядом с <b>backtest_v6.html</b>. Токен не нужен — данные публичные.</p>

<button id="btnRun" onclick="run()">Загрузить дивиденды</button>
<button id="btnSave" onclick="save()" disabled>Сохранить JSON</button>
<div id="log"></div>

<script>
const MOEX='https://iss.moex.com/iss';
let result=null;

function log(msg,cls=''){
  const el=document.getElementById('log');
  if(cls) el.innerHTML+=`<span class="${cls}">${msg}</span>\n`;
  else el.innerHTML+=msg+'\n';
  el.scrollTop=el.scrollHeight;
}

async function fetchRetry(url,retries=3,backoff=500){
  for(let i=0;i<=retries;i++){
    try{
      const c=new AbortController();const t=setTimeout(()=>c.abort(),15000);
      const r=await fetch(url,{signal:c.signal});clearTimeout(t);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }catch(e){if(i===retries)throw e;await sleep(backoff*(i+1))}
  }
}

async function loadMoexTickers(){
  log('Загрузка списка тикеров TQBR с MOEX...');
  const url=`${MOEX}/engines/stock/markets/shares/boards/TQBR/securities.json?iss.meta=off&iss.only=securities&securities.columns=SECID,SHORTNAME,LISTLEVEL`;
  const d=await fetchRetry(url);
  const tickers=d.securities.data.filter(r=>r[2]>=1&&r[2]<=3).map(r=>r[0]);
  log(`Найдено ${tickers.length} тикеров на TQBR`,'ok');
  return tickers;
}

async function loadTickerDividends(ticker){
  const url=`${MOEX}/securities/${ticker}/dividends.json?iss.meta=off`;
  const d=await fetchRetry(url);
  const cols=d.dividends.columns; // secid, isin, registryclosedate, value, currencyid
  const rows=d.dividends.data;
  if(!rows||!rows.length) return [];

  const iDate=cols.indexOf('registryclosedate');
  const iVal=cols.indexOf('value');
  const iCur=cols.indexOf('currencyid');

  return rows
    .filter(r=>r[iDate]&&r[iVal]>0)
    .map(r=>({
      record:r[iDate],         // дата закрытия реестра (ex-date на MOEX)
      amount:+r[iVal],         // размер дивиденда на акцию
      currency:r[iCur]||'RUB'
    }));
}

async function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// Simple concurrency limiter
class Semaphore{
  constructor(n){this.max=n;this.cnt=0;this.q=[]}
  async acquire(){if(this.cnt<this.max){this.cnt++;return}await new Promise(r=>this.q.push(r));this.cnt++}
  release(){this.cnt--;if(this.q.length)this.q.shift()()}
}

async function run(){
  const btn=document.getElementById('btnRun');
  btn.disabled=true;
  document.getElementById('log').innerHTML='';
  result=null;

  try{
    const tickers=await loadMoexTickers();
    const divData={};
    let found=0,errors=0;
    const total=tickers.length;
    const sem=new Semaphore(6);

    let done=0;
    const tasks=tickers.map(async tk=>{
      await sem.acquire();
      try{
        const divs=await loadTickerDividends(tk);
        if(divs.length>0){
          divData[tk]=divs;
          found++;
        }
      }catch(e){
        errors++;
        if(errors<=5) log(`  ${tk}: ошибка — ${e.message}`,'err');
      }finally{
        sem.release();
        done++;
        if(done%20===0||done===total)
          log(`Прогресс: ${done}/${total} (с дивидендами: ${found})`);
      }
      // Small delay to be polite to MOEX
      await sleep(50);
    });

    await Promise.all(tasks);

    result={
      generated:new Date().toISOString(),
      source:'MOEX ISS API (/securities/{ticker}/dividends.json)',
      tickerCount:Object.keys(divData).length,
      dividends:divData
    };

    log('');
    let totalDivs=0;
    for(const tk of Object.keys(divData)) totalDivs+=divData[tk].length;
    log(`Готово! ${Object.keys(divData).length} тикеров с дивидендами, ${totalDivs} выплат`,'ok');
    if(errors>0) log(`Ошибок: ${errors}`,'warn');
    log('');
    log('Нажмите "Сохранить JSON" чтобы скачать файл.');

    document.getElementById('btnSave').disabled=false;
  }catch(e){
    log(`Ошибка: ${e.message}`,'err');
    console.error(e);
  }finally{
    btn.disabled=false;
  }
}

function save(){
  if(!result) return;
  const blob=new Blob([JSON.stringify(result,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='dividends.json';
  a.click();
  URL.revokeObjectURL(a.href);
  log('Файл dividends.json сохранён!','ok');
}
</script>
</body>
</html>
